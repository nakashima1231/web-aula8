<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <style>
        h1 {
            color: lightgreen;
        }
    </style>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('btn_mostrar');
            botao.addEventListener('click', mostrando);
        }

        function mostrando() {
            let campo = document.getElementById('numero');
            let numero = parseInt(campo.value);

            let mensagem;

            if(isNaN(numero)) {
                mensagem = `Digite um numero valido`;
            } else {
                mensagem = `Digitado: ${numero} dobro: ${numero * 2}`;
            }

             let saida = document.getElementById('saida');
            saida.innerHTML = mensagem;
        }

    </script>
</head>

<body>
    <h1>Dobrador de Numero</h1>
    <input type="number" id="numero">
    <h2 id="saida"></h2>
    <button id="btn_mostrar">Mostrar</button>
</body>

</html>
